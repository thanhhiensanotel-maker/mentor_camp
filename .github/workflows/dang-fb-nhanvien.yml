# Đăng bài Facebook cho base "Nhan vien dang bai - AUTO TEST" — CÁCH 1: token FB nằm trong Secret,
# KHÔNG lưu trong Lark Base. Engine đọc TÊN page trong dòng -> tra token trong pages.json (từ Secret).
# Kích hoạt: nút Lark gửi repository_dispatch event "dang-fb-nhanvien" (hoặc chạy tay workflow_dispatch).
# KHÔNG liên quan / KHÔNG đụng workflow "dang-reel" (base SANOTEL CRM cũ).
name: dang-fb-nhanvien

on:
  repository_dispatch:
    types: [dang-fb-nhanvien]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "true = chỉ kiểm tra, KHÔNG đăng thật"
        type: boolean
        default: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Cài sharp (để nén ảnh lớn trước khi đăng)
        run: npm install sharp --no-save
      - name: Ghi kho token FB từ Secret (Cách 1)
        run: printf '%s' "$FB_PAGES_JSON" > pages.json
        env:
          FB_PAGES_JSON: ${{ secrets.FB_PAGES_JSON }}
      - name: Đăng bài Facebook (đọc base AUTO TEST, tra token theo tên page)
        env:
          LARK_APP_ID: cli_aadd39e646f8de18
          LARK_APP_SECRET: ${{ secrets.LARK_APP_SECRET_AT }}
          LARK_APP_TOKEN: VQeGbpFEQa6S1OsVlJXjGBTUpGd
          LARK_TABLE_ID: tbl2Hy3SYM2NfAkz
          PAGES_FILE: pages.json
          # KHÔNG set cứng tên field ở đây — engine tự dò tên field thật trong bảng (chống đổi tên cột).
          STATUS_DONE: "Đã đăng"
          STATUS_FAIL: "Lỗi"
          TRIGGER: "Chờ đăng"
          # Mặc định TÔN TRỌNG "Lịch đăng" (dòng hẹn giờ tương lai -> chờ). Nút "Đăng ngay" gửi
          # client_payload.force=true để đăng ngay bất kể lịch.
          FORCE: ${{ github.event.client_payload.force }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ] || [ "${{ github.event.client_payload.dry_run }}" = "true" ]; then
            node skill-dang-fb-nhanvien/post-fb-lark.mjs --dry-run
          else
            node skill-dang-fb-nhanvien/post-fb-lark.mjs
          fi
